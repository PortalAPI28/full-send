<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gotham Full Send</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0c10;--bg2:#0e1117;--card:#151921;--card-hover:#1a2030;--border:#252d3a;--border-focus:#58a6ff;--text:#e6edf3;--text-muted:#6e7681;--accent:#58a6ff;--accent-dim:rgba(88,166,255,0.10);--green:#3fb950;--green-dim:rgba(63,185,80,0.10);--yellow:#d29922;--yellow-dim:rgba(210,153,34,0.10);--red:#f85149;--red-dim:rgba(248,81,73,0.10);--orange:#db6d28;--purple:#a371f7;--purple-dim:rgba(163,113,247,0.10);--input-bg:#0d1117;--radius:6px;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;}
.app{display:flex;height:100vh;}

/* Sidebar */
.sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border);}
.sidebar-logo{font-size:15px;font-weight:800;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;}
.sidebar-logo span{color:var(--accent);}
.sidebar-auth{padding:10px 12px;border-bottom:1px solid var(--border);}
.auth-btn{width:100%;font-family:var(--font);font-size:11px;font-weight:600;padding:8px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all 0.12s;display:flex;align-items:center;gap:6px;justify-content:center;}
.auth-btn:hover{background:var(--card-hover);border-color:var(--text-muted);}
.auth-btn.signed-in{border-color:var(--green);background:var(--green-dim);color:var(--green);cursor:default;}
.auth-user{font-size:10px;color:var(--text-muted);text-align:center;margin-top:5px;font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sidebar-actions{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px;}
.sidebar-search{width:100%;font-family:var(--font);font-size:11px;padding:7px 10px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:border-color 0.15s;}
.sidebar-search:focus{border-color:var(--border-focus);box-shadow:0 0 0 2px var(--accent-dim);}
.sidebar-search::placeholder{color:#3a414a;}
.rep-picker{position:relative;}
.rep-picker-display{width:100%;font-family:var(--font);font-size:12px;padding:6px 9px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);cursor:pointer;min-height:32px;display:flex;align-items:center;flex-wrap:wrap;gap:4px;}
.rep-picker-display:hover{border-color:var(--text-muted);}
.rep-tag{font-size:10px;font-weight:600;background:var(--accent-dim);color:var(--accent);padding:2px 6px;border-radius:3px;}
.rep-picker-dd{position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);z-index:50;max-height:220px;overflow-y:auto;display:none;margin-top:2px;}
.rep-picker-dd.open{display:block;}
.rep-picker-dd::-webkit-scrollbar{width:4px;}
.rep-picker-dd::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.rep-picker-search{width:100%;font-family:var(--font);font-size:11px;padding:7px 9px;background:var(--input-bg);border:none;border-bottom:1px solid var(--border);color:var(--text);outline:none;}
.rep-picker-item{display:flex;align-items:center;gap:8px;padding:5px 10px;cursor:pointer;font-size:12px;transition:background 0.1s;}
.rep-picker-item:hover{background:rgba(255,255,255,0.04);}
.rep-picker-cb{width:14px;height:14px;border-radius:3px;border:1px solid var(--border);background:var(--input-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--accent);}
.rep-picker-cb.checked{background:var(--accent-dim);border-color:var(--accent);}
.btn{font-family:var(--font);font-size:12px;font-weight:600;padding:7px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);cursor:pointer;transition:all 0.12s;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn:hover{background:var(--card-hover);border-color:var(--text-muted);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#4090e0;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-danger{color:var(--red);border-color:transparent;background:var(--red-dim);}
.btn-danger:hover{background:rgba(248,81,73,0.2);}
.btn-ghost{border-color:transparent;background:transparent;color:var(--text-muted);}
.btn-ghost:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.btn-full{width:100%;justify-content:center;}
.btn-send{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;border:none;font-size:14px;padding:12px 20px;border-radius:8px;cursor:pointer;transition:all 0.15s;font-weight:700;width:100%;justify-content:center;display:flex;align-items:center;gap:8px;}
.btn-send:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(88,166,255,0.3);}
.btn-send:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.deal-list{flex:1;overflow-y:auto;padding:6px 8px;}
.deal-list::-webkit-scrollbar{width:4px;}
.deal-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* Rep folder */
.rep-folder{margin-bottom:2px;}
.rep-folder-header{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;transition:all 0.1s;color:var(--text-muted);font-size:12px;font-weight:600;}
.rep-folder-header:hover{background:var(--card-hover);color:var(--text);}
.rep-folder-header.active{color:var(--accent);}
.rep-folder-header .rep-arrow{font-size:8px;transition:transform 0.15s;width:12px;text-align:center;}
.rep-folder-header .rep-arrow.open{transform:rotate(90deg);}
.rep-folder-header .rep-cnt{font-family:var(--mono);font-size:9px;background:rgba(255,255,255,0.08);padding:1px 5px;border-radius:3px;margin-left:auto;}
.rep-folder-deals{padding-left:12px;overflow:hidden;max-height:0;transition:max-height 0.2s ease-out;}
.rep-folder-deals.open{max-height:2000px;}

.deal-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);cursor:pointer;transition:all 0.1s;border:1px solid transparent;margin-bottom:2px;}
.deal-item:hover{background:var(--card-hover);}
.deal-item.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.deal-item .deal-biz{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.deal-item .deal-date{font-size:9px;color:var(--text-muted);font-family:var(--mono);}
.deal-item .deal-close{display:none;font-size:14px;color:var(--text-muted);padding:2px 4px;border-radius:3px;line-height:1;}
.deal-item:hover .deal-close{display:block;}
.deal-item .deal-close:hover{background:var(--red-dim);color:var(--red);}
.deal-pip{font-size:9px;font-family:var(--mono);font-weight:600;padding:1px 5px;border-radius:3px;}
.pip-y{background:var(--yellow-dim);color:var(--yellow);}
.pip-g{background:var(--green-dim);color:var(--green);}
.pip-b{background:var(--accent-dim);color:var(--accent);}
.pip-r{background:var(--red-dim);color:var(--red);}
.sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);font-size:10px;color:var(--text-muted);}

/* Auth icon in tab bar */
.tab-auth{display:flex;align-items:center;gap:6px;margin-left:auto;padding:4px 8px;white-space:nowrap;position:relative;}
.tab-auth-name{font-size:11px;font-weight:600;color:var(--accent);}
.tab-auth-icon{width:26px;height:26px;border-radius:50%;background:var(--accent-dim);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--accent);transition:all 0.12s;}
.tab-auth-icon:hover{background:rgba(88,166,255,0.2);}
.tab-auth-login{font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;margin-left:auto;padding:6px 12px;}
.tab-auth-login:hover{text-decoration:underline;}
.signout-dd{position:absolute;top:100%;right:0;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:3px;box-shadow:0 6px 16px rgba(0,0,0,0.4);display:none;z-index:200;margin-top:4px;}
.signout-dd.show{display:block;}
.signout-dd button{display:block;width:100%;padding:7px 14px;border:none;background:transparent;color:var(--red);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;border-radius:4px;text-align:left;}
.signout-dd button:hover{background:var(--red-dim);}

/* Bulk action bar */
.bulk-bar{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--accent-dim);border:1px solid var(--accent);border-radius:var(--radius);margin-bottom:14px;font-size:12px;font-weight:600;color:var(--accent);}
.bulk-bar .btn{font-size:11px;padding:5px 10px;}

/* Main Panel */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tab-bar{display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 8px;min-height:38px;overflow-x:auto;gap:2px;}
.tab-bar::-webkit-scrollbar{height:0;}
.tab-dash{padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-muted);background:var(--card);border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;margin-bottom:-1px;transition:all 0.12s;white-space:nowrap;}
.tab-dash:hover{color:var(--text);background:var(--card-hover);}
.tab-dash.active{color:var(--accent);background:var(--bg);border-color:var(--accent);border-bottom:1px solid var(--bg);}
.tab-deal{display:flex;align-items:center;gap:6px;padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-muted);background:var(--card);border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;margin-bottom:-1px;transition:all 0.12s;white-space:nowrap;max-width:160px;}
.tab-deal:hover{color:var(--text);background:var(--card-hover);}
.tab-deal.active{color:var(--accent);background:var(--bg);border-color:var(--accent);border-bottom:1px solid var(--bg);}
.tab-deal .tab-name{overflow:hidden;text-overflow:ellipsis;}
.tab-deal .tab-x{font-size:13px;padding:0 2px;border-radius:3px;opacity:0.5;line-height:1;}
.tab-deal .tab-x:hover{opacity:1;background:var(--red-dim);color:var(--red);}
.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg);}
.content::-webkit-scrollbar{width:6px;}
.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* Dashboard */
.dash{max-width:960px;margin:0 auto;}
.dash-hero{margin-bottom:32px;}
.dash-hero h2{font-size:26px;font-weight:800;letter-spacing:-0.8px;margin-bottom:6px;}
.dash-hero p{color:var(--text-muted);font-size:14px;}
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.stat-card{flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.stat-card .stat-val{font-size:26px;font-weight:800;font-family:var(--mono);letter-spacing:-1px;}
.stat-card .stat-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:2px;}
.stat-accent{color:var(--accent);}
.stat-yellow{color:var(--yellow);}
.stat-green{color:var(--green);}
.stat-red{color:var(--red);}
.dash-table{width:100%;border-collapse:collapse;}
.dash-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);}
.dash-table td{padding:10px 12px;border-bottom:1px solid rgba(37,45,58,0.5);cursor:pointer;transition:background 0.1s;}
.dash-table tr:hover td{background:rgba(88,166,255,0.04);}
.dash-table .dt-biz{font-weight:600;font-size:13px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--text);}
.month-selector{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.month-selector select{font-family:var(--font);font-size:13px;padding:7px 12px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;}

/* Deal Form */
.deal-view{max-width:1100px;margin:0 auto;}
.deal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.deal-header h2{font-size:20px;font-weight:700;letter-spacing:-0.4px;}
.deal-header-actions{display:flex;gap:8px;}
.section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:14px;}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:14px;}
.section-email{border-color:rgba(163,113,247,0.3);}
.section-email .section-title{color:var(--purple);}
.fields-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;}
.field label{display:block;font-size:10px;font-weight:600;color:var(--text-muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px;}
.field input,.field select,.field textarea{width:100%;font-family:var(--mono);font-size:12px;padding:6px 9px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;transition:border-color 0.15s;}
.field textarea{resize:vertical;min-height:60px;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px var(--accent-dim);}
.field input::placeholder,.field textarea::placeholder{color:#3a414a;}
.field-wide{grid-column:span 2;}
.rev-table{width:100%;border-collapse:collapse;font-size:12px;}
.rev-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);text-align:left;padding:6px 8px;border-bottom:2px solid var(--border);}
.rev-table td{padding:3px 4px;border-bottom:1px solid var(--border);}
.rev-table input{width:100%;font-family:var(--mono);font-size:12px;padding:4px 7px;background:var(--input-bg);border:1px solid transparent;border-radius:4px;color:var(--text);outline:none;}
.rev-table input:focus{border-color:var(--border-focus);box-shadow:0 0 0 2px var(--accent-dim);}
.rev-table .row-label{width:34px;padding:3px 4px;}
.rev-table .row-label input{width:28px;text-align:center;font-family:var(--mono);font-size:11px;padding:4px 2px;background:var(--input-bg);border:1px solid var(--border);border-radius:4px;color:var(--text-muted);outline:none;}
.rev-table .row-label input:focus{border-color:var(--border-focus);box-shadow:0 0 0 2px var(--accent-dim);color:var(--text);}
.inline-group{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.radio-group{display:flex;gap:4px;}
.radio-group label{font-size:12px;font-weight:500;padding:4px 12px;border-radius:4px;cursor:pointer;border:1px solid var(--border);background:var(--input-bg);transition:all 0.12s;color:var(--text-muted);}
.radio-group input{display:none;}
.radio-group input:checked+label{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}

/* Drop zone */
.drop-zone{border:2px dashed var(--border);background:rgba(255,255,255,0.02);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;margin-top:10px;}
.drop-zone:hover{background:rgba(88,166,255,0.04);border-color:var(--accent);}
.drop-zone.dragover{background:rgba(88,166,255,0.08);border-color:var(--accent);}
.drop-zone p{font-size:12px;color:var(--text-muted);font-weight:500;}
.file-item{display:flex;justify-content:space-between;align-items:center;background:var(--input-bg);padding:6px 10px;border-radius:6px;margin-top:6px;border:1px solid var(--border);}
.file-item span{font-size:11px;font-family:var(--mono);color:var(--text);}
.file-remove{background:var(--red-dim);color:var(--red);border:none;padding:3px 8px;border-radius:4px;cursor:pointer;font-weight:700;font-size:12px;}

/* Lender table */
.risk-header{font-size:12px;font-weight:700;padding:8px 10px;border-radius:var(--radius);margin:10px 0 4px 0;display:flex;align-items:center;gap:7px;}
.risk-header::before{content:'';width:7px;height:7px;border-radius:50%;}
.risk-low{background:var(--green-dim);color:var(--green);}
.risk-mid{background:var(--yellow-dim);color:var(--yellow);}
.risk-high{background:var(--red-dim);color:var(--red);}
.risk-low::before{background:var(--green);}
.risk-mid::before{background:var(--yellow);}
.risk-high::before{background:var(--red);}
.lender-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
.lender-table th{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-muted);text-align:left;padding:5px 8px;border-bottom:1px solid var(--border);}
.lender-table td{padding:4px 8px;border-bottom:1px solid rgba(37,45,58,0.4);vertical-align:top;}
.lender-table tr{cursor:pointer;transition:background 0.12s;user-select:none;}
.lender-table tr:hover td{background:rgba(88,166,255,0.04);}
.lender-table tr.sent td{background:var(--yellow-dim);}
.lender-table tr.sent .lender-name{color:var(--yellow);}
.lender-table tr.sent:hover td{background:rgba(210,153,34,0.16);}
.lender-table tr.approved td{background:var(--accent-dim);}
.lender-table tr.approved .lender-name{color:var(--accent);}
.lender-table tr.approved:hover td{background:rgba(88,166,255,0.16);}
.lender-table tr.declined td{background:var(--red-dim);}
.lender-table tr.declined .lender-name{color:var(--red);}
.lender-table tr.declined:hover td{background:rgba(248,81,73,0.16);}
.lender-table tr.funded td{background:var(--green-dim);}
.lender-table tr.funded .lender-name{color:var(--green);}
.lender-table tr.funded:hover td{background:rgba(63,185,80,0.16);}
.lender-table tr.omns td{background:var(--orange);background:rgba(219,109,40,0.10);}
.lender-table tr.omns .lender-name{color:var(--orange);}
.lender-table tr.omns:hover td{background:rgba(219,109,40,0.16);}
.lender-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lender-email{font-family:var(--mono);font-size:10px;color:var(--text-muted);word-break:break-all;}
.lender-exempt{font-size:10px;color:var(--yellow);}
.portal-badge{font-size:8px;font-family:var(--mono);background:var(--purple-dim);color:var(--purple);padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:700;}
.emailed-badge{font-size:7px;font-family:var(--mono);background:var(--accent-dim);color:var(--accent);padding:1px 4px;border-radius:3px;margin-left:4px;font-weight:700;}
.col-name{width:16%;}.col-email{width:35%;}.col-exempt{width:16%;}.col-status{width:33%;}
.lender-table .status-input{width:100%;font-family:var(--font);font-size:11px;padding:3px 7px;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--text);outline:none;transition:all 0.12s;}
.lender-table .status-input:hover{border-color:var(--border);background:var(--input-bg);}
.lender-table .status-input:focus{border-color:var(--border-focus);background:var(--input-bg);box-shadow:0 0 0 2px var(--accent-dim);}

/* Context menu */
.ctx-menu{position:fixed;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px;box-shadow:0 8px 24px rgba(0,0,0,0.5);display:none;min-width:170px;animation:fadeIn 0.1s ease-out;}
.ctx-menu.show{display:block;}
.ctx-menu button{display:flex;align-items:center;gap:8px;width:100%;padding:7px 11px;border:none;background:transparent;color:var(--text);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;border-radius:5px;transition:background 0.1s;}
.ctx-menu button:hover{background:rgba(255,255,255,0.06);}
.ctx-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;}
.ctx-ico{width:14px;height:14px;flex-shrink:0;}

/* Overlays */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fadeIn 0.15s ease-out;}
.overlay-box{background:var(--card);border-radius:14px;padding:24px;max-width:420px;width:90%;animation:fadeIn 0.15s ease-out;}
.overlay-box h3{font-size:15px;font-weight:700;margin-bottom:2px;}
.overlay-box .overlay-sub{font-size:11px;color:var(--text-muted);margin-bottom:16px;}
.overlay-box .overlay-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.overlay-box .overlay-grid .field label{font-size:10px;}
.overlay-box .overlay-grid .field input,.overlay-box .overlay-grid .field textarea{font-size:13px;padding:7px 9px;}
.overlay-box .overlay-full{margin-bottom:16px;}
.overlay-box .overlay-full .field label{font-size:10px;}
.overlay-box .overlay-full .field input,.overlay-box .overlay-full .field textarea{font-size:13px;padding:7px 9px;}
.overlay-btns{display:flex;gap:8px;justify-content:flex-end;}
.overlay-btns .btn{padding:8px 16px;}
.btn-approve-action{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
.btn-approve-action:hover{background:rgba(88,166,255,0.2);}
.btn-funded-action{background:var(--green-dim);color:var(--green);border-color:var(--green);}
.btn-funded-action:hover{background:rgba(63,185,80,0.2);}
.btn-omns-action{background:rgba(219,109,40,0.10);color:var(--orange);border-color:var(--orange);}
.btn-omns-action:hover{background:rgba(219,109,40,0.2);}

/* Reps overlay */
.reps-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.reps-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:420px;width:90%;}
.reps-box h3{font-size:16px;font-weight:700;margin-bottom:14px;}
.rep-list-manage{margin-bottom:14px;}
.rep-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.rep-row span{flex:1;font-size:13px;font-weight:500;}
.rep-row .btn{padding:3px 8px;font-size:10px;}
.add-rep-row{display:flex;gap:6px;margin-top:10px;}
.add-rep-row input{flex:1;font-family:var(--font);font-size:13px;padding:7px 10px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);outline:none;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;font-weight:600;font-size:12px;padding:8px 18px;border-radius:var(--radius);opacity:0;transform:translateY(10px);transition:all 0.25s;pointer-events:none;z-index:300;background:var(--green);color:#fff;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.error{background:var(--red);}

/* Legend */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;padding:8px 0;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted);}
.legend-dot{width:10px;height:10px;border-radius:3px;}
.ld-y{background:var(--yellow-dim);border:1px solid var(--yellow);}
.ld-b{background:var(--accent-dim);border:1px solid var(--accent);}
.ld-r{background:var(--red-dim);border:1px solid var(--red);}
.ld-g{background:var(--green-dim);border:1px solid var(--green);}
.ld-o{background:rgba(219,109,40,0.10);border:1px solid var(--orange);}

/* Progress */
.progress-section{margin-top:14px;display:none;}
.progress-bar{width:100%;height:24px;background:var(--input-bg);border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--purple));width:0%;transition:width 0.3s;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:11px;font-family:var(--mono);}
.progress-text{text-align:center;color:var(--text-muted);font-size:11px;font-weight:600;margin-top:6px;}
.send-results{margin-top:12px;padding:12px;border-radius:8px;font-size:11px;font-family:var(--mono);}
.send-results.success{background:var(--green-dim);color:var(--green);border:1px solid rgba(63,185,80,0.2);}
.send-results.partial{background:var(--yellow-dim);color:var(--yellow);border:1px solid rgba(210,153,34,0.2);}
.send-results .failed-list{margin-top:6px;color:var(--red);}

/* Sync */
.sync-indicator{display:flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);color:var(--text-muted);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.sync-dot.offline{background:var(--red);}

@keyframes fadeIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}

@media(max-width:800px){.sidebar{width:0;min-width:0;overflow:hidden;position:fixed;z-index:100;height:100vh;}.sidebar.open{width:260px;min-width:260px;}.col-email{display:none;}.fields-grid{grid-template-columns:1fr 1fr;}}

@media print{
  body{background:#fff;color:#000;overflow:visible;}
  .sidebar,.tab-bar,.deal-header-actions,.ctx-menu,.toast,.legend,.sync-indicator,.section-email,.btn-send,.progress-section,.send-results{display:none!important;}
  .main,.content{overflow:visible!important;}
  .section{border-color:#ccc;background:#fff;}
  .field input,.field textarea,.rev-table input,.status-input{border:none!important;background:none!important;box-shadow:none!important;color:#000!important;font-weight:600;}
  .risk-header{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .lender-table tr.sent td{background:#fff3cd!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .lender-table tr.approved td{background:#cce5ff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .lender-table tr.declined td{background:#f8d7da!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .lender-table tr.funded td{background:#d4edda!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .lender-table tr.omns td{background:#fde8cd!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>

let deals={},reps=[],selectedRep=null,activeView='dashboard',lastTab='dashboard',firebaseUrl='https://submissions-tracker-db9ac-default-rtdb.firebaseio.com',ctxTarget=null,accessToken=null,signedInUser=null,dealFiles={},recentlyDeleted=new Set(),expandedReps={},selectedMonth=null,webhookUrl='',searchQuery='',openTabs=[];

function saveToFirebase(){if(!firebaseUrl)return;fetch(firebaseUrl+'/deals.json',{method:'PATCH',body:JSON.stringify(deals),headers:{'Content-Type':'application/json'}}).then(()=>setSyncStatus(true)).catch(()=>setSyncStatus(false));fetch(firebaseUrl+'/reps.json',{method:'PUT',body:JSON.stringify(reps),headers:{'Content-Type':'application/json'}}).catch(()=>{});if(webhookUrl)fetch(firebaseUrl+'/config/webhookUrl.json',{method:'PUT',body:JSON.stringify(webhookUrl),headers:{'Content-Type':'application/json'}}).catch(()=>{});}
function deleteDealFromFirebase(id){if(!firebaseUrl)return;return fetch(firebaseUrl+'/deals/'+id+'.json',{method:'DELETE'});}
function loadFromFirebase(cb){if(!firebaseUrl){cb();return;}Promise.all([fetch(firebaseUrl+'/deals.json').then(r=>r.json()),fetch(firebaseUrl+'/reps.json').then(r=>r.json()),fetch(firebaseUrl+'/config/webhookUrl.json').then(r=>r.json()).catch(()=>null)]).then(([dd,rr,wh])=>{if(dd&&typeof dd==='object'){const lo={};Object.keys(deals).forEach(k=>{if(!dd[k])lo[k]=deals[k];});Object.keys(dd).forEach(k=>{if(deals[k]&&deals[k].storedFiles&&deals[k].storedFiles.length&&(!dd[k].storedFiles||!dd[k].storedFiles.length)){dd[k].storedFiles=deals[k].storedFiles;}});deals=Object.assign({},dd,lo);}if(Array.isArray(rr)&&rr.length)reps=rr;if(wh&&typeof wh==='string')webhookUrl=wh;setSyncStatus(true);saveLocal();cb();}).catch(()=>{setSyncStatus(false);cb();});}
function persist(){saveLocal();saveToFirebase();}
function setSyncStatus(on){const d=document.getElementById('sync-dot'),t=document.getElementById('sync-text');if(!firebaseUrl){t.textContent='Local mode';d.className='sync-dot offline';return;}d.className=on?'sync-dot':'sync-dot offline';t.textContent=on?'Synced':'Offline';}

// Auth
async function authenticate(){try{const r=await msalInstance.loginPopup({scopes:['Mail.Send','User.Read'],prompt:'select_account'});const email=r.account.username.toLowerCase();if(!email.endsWith('@gothamcapitalfunding.com')){accessToken=null;alert('Access Denied: Only @gothamcapitalfunding.com emails are authorized.');return;}accessToken=r.accessToken;signedInUser=r.account;renderAll();}catch(e){}}
async function ensureToken(){if(!signedInUser)return null;try{const r=await msalInstance.acquireTokenSilent({scopes:['Mail.Send','User.Read'],account:signedInUser});accessToken=r.accessToken;return accessToken;}catch(e){try{const r=await msalInstance.acquireTokenPopup({scopes:['Mail.Send','User.Read']});accessToken=r.accessToken;return accessToken;}catch(e2){return null;}}}
function signOut(){msalInstance.logoutPopup().then(()=>{accessToken=null;signedInUser=null;renderAll();}).catch(()=>{});}
(function(){const accts=msalInstance.getAllAccounts();if(accts.length){signedInUser=accts[0];const em=signedInUser.username.toLowerCase();if(em.endsWith('@gothamcapitalfunding.com')){msalInstance.acquireTokenSilent({scopes:['Mail.Send','User.Read'],account:signedInUser}).then(r=>{accessToken=r.accessToken;}).catch(()=>{});}}})();

// Helpers
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,isErr){const t=document.getElementById('toast');t.textContent=msg;t.className=isErr?'toast error show':'toast show';setTimeout(()=>t.classList.remove('show'),3000);}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function formatCurrency(val){const num=parseFloat((val||'').replace(/[^0-9.]/g,''));if(isNaN(num)||num===0)return val;return'$'+num.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
function parseCurrency(val){const num=parseFloat((val||'').replace(/[^0-9.]/g,''));return isNaN(num)?0:num;}
function setupCurrencyField(id){const el=document.getElementById(id);if(!el)return;el.addEventListener('blur',()=>{if(el.value.trim())el.value=formatCurrency(el.value);});}
function getAllLendersFlat(){const a=[];Object.entries(LENDERS).forEach(([risk,list])=>{list.forEach((l,i)=>{a.push({...l,key:`${risk}-${i}`});});});return a;}

// Deal helpers
function newDealData(){const id='deal_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);return{id,reps:[],fields:{},courts:'',rev:{},lenders:{},lenderStates:{},emailFields:{},emailedLenders:[],approvalData:{},fundedData:{},omnsData:{},created:new Date().toISOString()};}
function getDealLabel(d){return d.fields?.business||'Untitled Deal';}
function isDealActive(d){if(d.archived)return false;if(!d.lenderStates)return true;return!Object.values(d.lenderStates).some(v=>v==='funded'||v==='omns');}
function isDealFunded(d){return!d.archived&&d.lenderStates&&Object.values(d.lenderStates).some(v=>v==='funded');}
function isDealOMNS(d){return!d.archived&&!isDealFunded(d)&&d.lenderStates&&Object.values(d.lenderStates).some(v=>v==='omns');}
function getDealPips(d){let s=0,a=0,dec=0,f=0,o=0;if(d.lenderStates)Object.values(d.lenderStates).forEach(v=>{if(v==='sent')s++;if(v==='approved')a++;if(v==='declined')dec++;if(v==='funded')f++;if(v==='omns')o++;});return{sent:s,approved:a,declined:dec,funded:f,omns:o};}
function getActiveDeals(){return Object.values(deals).filter(d=>isDealActive(d)&&canSee(d)).sort((a,b)=>b.created.localeCompare(a.created));}
function getFundedDeals(){return Object.values(deals).filter(d=>isDealFunded(d)&&canSee(d)).sort((a,b)=>b.created.localeCompare(a.created));}
function getOMNSDeals(){return Object.values(deals).filter(d=>isDealOMNS(d)&&canSee(d)).sort((a,b)=>b.created.localeCompare(a.created));}
function getArchivedDeals(){return Object.values(deals).filter(d=>d.archived&&canSee(d)).sort((a,b)=>b.created.localeCompare(a.created));}
function getDealMonth(d){const dt=d.fields?.date;if(!dt)return null;const p=dt.split('-');return p.length>=2?parseInt(p[1])-1:null;}
function getDealYear(d){const dt=d.fields?.date;if(!dt)return null;return parseInt(dt.split('-')[0]);}

// CRUD
function createDeal(){const d=newDealData();const mn=myRepName();if(mn&&REP_CHECKLIST.includes(mn))d.reps=[mn];deals[d.id]=d;openTabs.push(d.id);activeView=d.id;persist();renderTabBar();renderSidebar();renderDealView(d.id);}
function deleteDeal(id){if(!confirm('Archive this deal?'))return;deals[id].archived=true;openTabs=openTabs.filter(t=>t!==id);if(activeView===id){if(openTabs.length)switchToTab(openTabs[openTabs.length-1]);else{activeView='dashboard';}}persist();renderAll();toast('Deal archived');}
function restoreDeal(id){if(!deals[id])return;delete deals[id].archived;persist();renderAll();toast('Deal restored');}
function permanentDelete(id){if(!confirm('Permanently delete this deal? This cannot be undone.'))return;const d=deals[id];if(d&&d.storedFiles)d.storedFiles.forEach(f=>{fetch('https://firebasestorage.googleapis.com/v0/b/'+STORAGE_BUCKET+'/o/'+encodeURIComponent(f.path),{method:'DELETE'}).catch(function(){});});fetch(firebaseUrl+'/fileData/'+id+'.json',{method:'DELETE'}).catch(function(){});recentlyDeleted.add(id);delete deals[id];delete dealFiles[id];openTabs=openTabs.filter(t=>t!==id);if(activeView===id)activeView='archive';saveLocal();deleteDealFromFirebase(id).then(()=>{toast('Deal permanently deleted');}).catch(()=>{toast('Delete failed',true);});renderAll();}

// Tab bar
function renderTabBar(){
  const ctx=['dashboard','funded','omns','monthly','archive'].includes(activeView)?activeView:lastTab;
  const mainTabs=['dashboard','funded','omns','monthly','archive'].map(v=>{const labels={dashboard:'Active Deals',funded:'Funded',omns:'OMNS',monthly:'Monthly',archive:'Archive'};return`<div class="tab-dash${ctx===v&&!deals[activeView]?' active':''}" onclick="showView('${v}')">${labels[v]}</div>`;}).join('');
  const dealTabs=openTabs.map(id=>{const d=deals[id];if(!d)return'';const name=getDealLabel(d);return`<div class="tab-deal${activeView===id?' active':''}" onclick="switchToTab('${id}')"><span class="tab-name">${esc(name)}</span><span class="tab-x" onclick="event.stopPropagation();closeTab('${id}')">&times;</span></div>`;}).join('');
  const cu=getCU();let authHTML='';
  if(signedInUser&&cu){const initial=cu.name.charAt(0).toUpperCase();authHTML=`<div class="tab-auth"><span class="tab-auth-name">${esc(cu.name)}</span><div class="tab-auth-icon" oncontextmenu="event.preventDefault();toggleSignoutDD();" onclick="toggleSignoutDD();">${initial}</div><div class="signout-dd" id="signout-dd"><button onclick="signOut()">Sign Out</button></div></div>`;}
  else{authHTML=`<div class="tab-auth-login" onclick="authenticate()">Sign in with Microsoft</div>`;}

}
function toggleSignoutDD(){const dd=document.getElementById('signout-dd');if(dd)dd.classList.toggle('show');}
document.addEventListener('click',e=>{const dd=document.getElementById('signout-dd');if(dd&&!dd.parentElement.contains(e.target))dd.classList.remove('show');});
function showView(v){if(!['dashboard','funded','omns','monthly','archive'].includes(activeView)&&deals[activeView])saveDealFromDOM(activeView);activeView=v;lastTab=v;saveLocal();renderAll();}
function openDeal(id){if(!['dashboard','funded','omns','monthly','archive'].includes(activeView)&&deals[activeView])saveDealFromDOM(activeView);if(!openTabs.includes(id))openTabs.push(id);activeView=id;saveLocal();renderTabBar();renderSidebar();renderDealView(id);}
function switchToTab(id){if(!['dashboard','funded','omns','monthly','archive'].includes(activeView)&&deals[activeView])saveDealFromDOM(activeView);activeView=id;saveLocal();renderTabBar();renderSidebar();renderDealView(id);}
function closeTab(id){if(deals[id])saveDealFromDOM(id);openTabs=openTabs.filter(t=>t!==id);if(activeView===id){if(openTabs.length)switchToTab(openTabs[openTabs.length-1]);else showView(lastTab);}else{renderTabBar();}}

// Sidebar
function getSidebarDeals(){
  const ctx=['dashboard','funded','omns','monthly','archive'].includes(activeView)?activeView:lastTab;
  let list;
  if(ctx==='funded')list=getFundedDeals();else if(ctx==='omns')list=getOMNSDeals();else if(ctx==='archive')list=getArchivedDeals();
  else if(ctx==='monthly'){const now=new Date(),yr=now.getFullYear();if(selectedMonth===null)selectedMonth=now.getMonth();list=Object.values(deals).filter(d=>!d.archived&&canSee(d)&&getDealMonth(d)===selectedMonth&&getDealYear(d)===yr).sort((a,b)=>b.created.localeCompare(a.created));}
  else list=getActiveDeals();
  if(searchQuery)list=list.filter(d=>(getDealLabel(d).toLowerCase().includes(searchQuery)||(d.fields?.name||'').toLowerCase().includes(searchQuery)||getDRD(d).toLowerCase().includes(searchQuery)));
  return list;
}
function renderSidebar(){
  const list=document.getElementById('deal-list');const sd=getSidebarDeals();const byRep={};
  sd.forEach(d=>{const dr=getDR(d);if(!dr.length){if(!byRep['__un'])byRep['__un']=[];byRep['__un'].push(d);}else dr.forEach(r=>{if(!byRep[r])byRep[r]=[];if(!byRep[r].find(x=>x.id===d.id))byRep[r].push(d);});});
  let html='';const allOpen=expandedReps['__all__'];
  html+=`<div class="rep-folder"><div class="rep-folder-header${!selectedRep?' active':''}" onclick="expandedReps['__all__']=!expandedReps['__all__'];selectedRep=null;renderSidebar();renderCV();"><span class="rep-arrow${allOpen?' open':''}">&#9654;</span><span style="font-size:11px;">All</span><span class="rep-cnt">${sd.length}</span></div><div class="rep-folder-deals${allOpen?' open':''}">`;
  sd.forEach(d=>{html+=diHTML(d);});html+=`</div></div>`;
  REP_CHECKLIST.forEach(r=>{const rd=byRep[r];if(!rd||!rd.length)return;const io=expandedReps[r],is=selectedRep===r;html+=`<div class="rep-folder"><div class="rep-folder-header${is?' active':''}" onclick="toggleRep('${esc(r)}')"><span class="rep-arrow${io?' open':''}">&#9654;</span><span>${esc(r)}</span><span class="rep-cnt">${rd.length}</span></div><div class="rep-folder-deals${io?' open':''}">`;rd.forEach(d=>{html+=diHTML(d);});html+=`</div></div>`;});
  const un=byRep['__un']||[];if(un.length){const io=expandedReps['__un'];html+=`<div class="rep-folder"><div class="rep-folder-header" onclick="toggleRep('__un')"><span class="rep-arrow${io?' open':''}">&#9654;</span><span style="color:var(--text-muted);">Unassigned</span><span class="rep-cnt">${un.length}</span></div><div class="rep-folder-deals${io?' open':''}">`;un.forEach(d=>{html+=diHTML(d);});html+=`</div></div>`;}
  list.innerHTML=html||'<div class="empty-state" style="padding:30px 10px;"><p style="font-size:12px;">No deals</p></div>';
}
function diHTML(d){const p=getDealPips(d),ia=activeView===d.id,arc=lastTab==='archive'||activeView==='archive';let pp='';if(p.sent)pp+=`<span class="deal-pip pip-y">${p.sent}S</span>`;if(p.approved)pp+=`<span class="deal-pip pip-b">${p.approved}A</span>`;if(p.declined)pp+=`<span class="deal-pip pip-r">${p.declined}D</span>`;if(p.funded)pp+=`<span class="deal-pip pip-g">${p.funded}F</span>`;if(p.omns)pp+=`<span class="deal-pip" style="background:rgba(219,109,40,0.10);color:var(--orange);">${p.omns}O</span>`;const reps=getDRD(d);const cb=arc?`<span class="deal-close" onclick="event.stopPropagation();restoreDeal('${d.id}')" title="Restore" style="color:var(--green);">&#8617;</span>`:`<span class="deal-close" onclick="event.stopPropagation();deleteDeal('${d.id}')">&times;</span>`;return`<div class="deal-item${ia?' active':''}" onclick="openDeal('${d.id}')"><div style="flex:1;overflow:hidden;"><div class="deal-biz">${esc(getDealLabel(d))}</div><div style="display:flex;align-items:center;gap:6px;margin-top:2px;"><span style="font-size:9px;color:var(--text-muted);font-family:var(--mono);">${d.fields?.date||''}</span>${reps?`<span style="font-size:9px;color:var(--accent);font-weight:600;">${esc(reps)}</span>`:''} ${pp}</div></div>${cb}</div>`;}
function toggleRep(r){expandedReps[r]=!expandedReps[r];renderSidebar();}
function selectRep(r){selectedRep=r;renderSidebar();renderCV();}
function renderCV(){if(activeView==='dashboard')renderDashboard();else if(activeView==='funded')renderFundedView();else if(activeView==='omns')renderOMNSView();else if(activeView==='monthly')renderMonthlyView();else if(activeView==='archive')renderArchiveView();}
function renderAll(){renderTabBar();renderSidebar();const v=activeView;if(v==='dashboard')renderDashboard();else if(v==='funded')renderFundedView();else if(v==='omns')renderOMNSView();else if(v==='monthly')renderMonthlyView();else if(v==='archive')renderArchiveView();else if(deals[v])renderDealView(v);else{activeView='dashboard';renderTabBar();renderDashboard();}}

// Dashboard (Active Deals)
function renderDashboard(){
  const c=document.getElementById('content');let ad=getActiveDeals();
  if(selectedRep==='__un')ad=ad.filter(d=>!getDR(d).length);else if(selectedRep)ad=ad.filter(d=>getDR(d).includes(selectedRep));
  let ta=0,td2=0,totAppAmt=0;
  const lf=getAllLendersFlat();const approvals=[];
  ad.forEach(d=>{const p=getDealPips(d);ta+=p.approved;td2+=p.declined;
    if(!d.lenderStates||!d.approvalData)return;Object.entries(d.lenderStates).forEach(([lk,st])=>{if(st==='approved'&&d.approvalData[lk]){const a=d.approvalData[lk];const l=lf.find(x=>x.key===lk);const amt=parseCurrency(a.amount);totAppAmt+=amt;approvals.push({biz:d.fields?.business||'—',ln:l?l.name:lk,lk:lk,amt:a.amount||'',term:a.term||'',rate:a.rate||'',pay:a.payment||'',rep:getDRD(d)||'—',did:d.id});}});});
  // Active deals table with checkboxes

  let appHtml='';if(approvals.length){appHtml=`<div class="section" style="margin-bottom:20px;"><div class="section-title">Approval Details</div><table class="dash-table"><thead><tr><th>Status</th><th>Business</th><th>Lender</th><th>Amount</th><th>Term</th><th>Rate</th><th>Payment</th><th>Rep</th></tr></thead><tbody>${approvals.map(a=>`<tr onclick="openDeal('${a.did}')" oncontextmenu="showDashCtx(event,'${a.did}','${a.lk}')"><td><span style="font-size:10px;font-weight:700;color:var(--green);font-family:var(--mono);">APPROVED</span></td><td class="dt-biz">${esc(a.biz)}</td><td style="font-size:12px;">${esc(a.ln)}</td><td style="font-family:var(--mono);font-size:12px;color:var(--green);font-weight:600;">${esc(a.amt)}</td><td style="font-family:var(--mono);font-size:12px;">${esc(a.term)}</td><td style="font-family:var(--mono);font-size:12px;">${esc(a.rate)}</td><td style="font-family:var(--mono);font-size:12px;">${esc(a.pay)}</td><td style="font-size:12px;color:var(--accent);">${esc(a.rep)}</td></tr>`).join('')}</tbody></table></div>`;}
  c.innerHTML=`<div class="dash"><div class="dash-hero"><h2>Active Deals</h2></div><div class="stats-row"><div class="stat-card"><div class="stat-val stat-accent">${ad.length}</div><div class="stat-label">Active Deals</div></div><div class="stat-card"><div class="stat-val stat-green">$${Math.round(totAppAmt).toLocaleString()}</div><div class="stat-label">Total Approval Amt</div></div><div class="stat-card"><div class="stat-val stat-green">${ta}</div><div class="stat-label">Approved</div></div><div class="stat-card"><div class="stat-val stat-red">${td2}</div><div class="stat-label">Declined</div></div></div>${dealsHtml}${appHtml}${!ad.length?'<div class="empty-state"><h3>No active deals</h3><p>Click <strong>+ New Deal</strong> to get started.</p></div>':''}</div>`;
}

// Funded
function renderFundedView(){
  const c=document.getElementById('content');let fd=getFundedDeals();
  if(selectedRep==='__un')fd=fd.filter(d=>!getDR(d).length);else if(selectedRep)fd=fd.filter(d=>getDR(d).includes(selectedRep));
  const lf=getAllLendersFlat();const entries=[];

  });
  view.addEventListener('change',()=>{saveDealFromDOM(id);renderSidebar();});
  // 4-way arrow key navigation between fields
  view.addEventListener('keydown',(e)=>{
    if(!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))return;
    const el=e.target;if(el.tagName!=='INPUT'||el.type==='date'||el.type==='file'||el.type==='radio')return;
    if(e.key==='ArrowLeft'&&el.selectionStart!==0)return;
    if(e.key==='ArrowRight'&&el.selectionStart!==el.value.length)return;
    const inputs=Array.from(view.querySelectorAll('input:not([type=radio]):not([type=file]),textarea'));
    const idx=inputs.indexOf(el);if(idx===-1)return;
    const rect=el.getBoundingClientRect();const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    if(e.key==='ArrowLeft'){const prev=idx-1;if(prev>=0){e.preventDefault();inputs[prev].focus();}return;}
    if(e.key==='ArrowRight'){const next=idx+1;if(next<inputs.length){e.preventDefault();inputs[next].focus();}return;}
    // Up/Down: find closest field in the right direction by position
    let best=null,bestDist=Infinity;
    inputs.forEach((inp,i)=>{if(i===idx)return;const r=inp.getBoundingClientRect();const ix=r.left+r.width/2,iy=r.top+r.height/2;
      if(e.key==='ArrowDown'&&iy<=cy+5)return;if(e.key==='ArrowUp'&&iy>=cy-5)return;
      const dist=Math.abs(ix-cx)*0.5+Math.abs(iy-cy);
      if(dist<bestDist){bestDist=dist;best=inp;}
    });
    if(best){e.preventDefault();best.focus();}
  });
}

function setupFileHandling(id){const dz=document.getElementById('drop-zone-'+id),fi=document.getElementById('file-input-'+id);dz.addEventListener('click',()=>fi.click());dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover');});dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');uploadFiles(id,e.dataTransfer.files);});fi.addEventListener('change',e=>{uploadFiles(id,e.target.files);});}

async function uploadFiles(id,files){
  const d=deals[id];if(!d)return;d.storedFiles=d.storedFiles||[];
  if(!dealFiles[id])dealFiles[id]=[];
  const dz=document.getElementById('drop-zone-'+id);
  const fl=document.getElementById('file-list-'+id);
  for(const file of Array.from(files)){
    if(d.storedFiles.find(f=>f.name===file.name)){toast(file.name+' already attached');continue;}
    const path='deals/'+id+'/'+file.name;
    if(dz)dz.innerHTML='<p style="color:var(--accent);">Uploading '+esc(file.name)+'...</p>';
    try{
      const r=await fetch('https://firebasestorage.googleapis.com/v0/b/'+STORAGE_BUCKET+'/o?uploadType=media&name='+encodeURIComponent(path),{method:'POST',headers:{'Content-Type':file.type||'application/octet-stream'},body:file});
      if(!r.ok)throw new Error('Upload failed');
      const url='https://firebasestorage.googleapis.com/v0/b/'+STORAGE_BUCKET+'/o/'+encodeURIComponent(path)+'?alt=media';
      d.storedFiles.push({name:file.name,url:url,path:path,type:file.type||'application/octet-stream',fbKey:file.name.replace(/[.#$/\[\]]/g,'_')});
      dealFiles[id].push(file);
      // Save base64 to RTDB for email attachments (avoids CORS)
      var b64=await new Promise(function(rv,rj){var rd=new FileReader();rd.onload=function(){rv(rd.result.split(',')[1]);};rd.onerror=rj;rd.readAsDataURL(file);});
      fetch(firebaseUrl+'/fileData/'+id+'/'+file.name.replace(/[.#$/\[\]]/g,'_')+'.json',{method:'PUT',body:JSON.stringify({name:file.name,contentBytes:b64}),headers:{'Content-Type':'application/json'}});
      toast(file.name+' uploaded');
    }catch(e){toast('Failed to upload '+file.name,true);}
  }
  if(dz)dz.innerHTML='<p>Drag & Drop Files Here or Click to Browse</p>';
  persist();
  // Direct save storedFiles to this deal's Firebase node to prevent polling race
  if(firebaseUrl)fetch(firebaseUrl+'/deals/'+id+'/storedFiles.json',{method:'PUT',body:JSON.stringify(d.storedFiles),headers:{'Content-Type':'application/json'}});
  if(fl)buildFileListDOM(fl,d.storedFiles,id);
}

function renderDealFiles(id){
  var fl=document.getElementById('file-list-'+id);if(!fl)return;
  var d=deals[id];if(!d)return;
  buildFileListDOM(fl,d.storedFiles||[],id);
}

function buildFileListDOM(el,files,dealId){
  if(!files||!files.length){el.innerHTML='';return;}
  var html='<div style="margin-top:10px;padding:10px;background:var(--green-dim);border:1px solid rgba(63,185,80,0.2);border-radius:var(--radius);">';
  html+='<div style="font-size:10px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">'+files.length+' file'+(files.length>1?'s':'')+' attached</div>';
  for(var i=0;i<files.length;i++){
    html+='<div class="file-item"><span>'+esc(files[i].name)+'</span><button class="file-remove" onclick="removeStoredFile(\''+dealId+'\','+i+')">x</button></div>';
  }
  html+='</div>';
  el.innerHTML=html;
}

async function removeStoredFile(id,idx){
  const d=deals[id];if(!d||!d.storedFiles)return;
  const f=d.storedFiles[idx];if(!f)return;
  try{await fetch('https://firebasestorage.googleapis.com/v0/b/'+STORAGE_BUCKET+'/o/'+encodeURIComponent(f.path),{method:'DELETE'});}catch(e){}
  var safeKey=f.fbKey||f.name.replace(/[.#$/\[\]]/g,'_');
  fetch(firebaseUrl+'/fileData/'+id+'/'+safeKey+'.json',{method:'DELETE'}).catch(function(){});
  d.storedFiles.splice(idx,1);
  if(dealFiles[id])dealFiles[id].splice(idx,1);
  persist();
  if(firebaseUrl)fetch(firebaseUrl+'/deals/'+id+'/storedFiles.json',{method:'PUT',body:JSON.stringify(d.storedFiles||[]),headers:{'Content-Type':'application/json'}});
  renderDealFiles(id);
}

async function storedFileToAttachment(f,idx,dealId){
  // Try in-memory file first (current session)
  if(dealId&&dealFiles[dealId]&&dealFiles[dealId][idx]){
    var file=dealFiles[dealId][idx];
    return new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res({'@odata.type':'#microsoft.graph.fileAttachment',name:file.name,contentBytes:r.result.split(',')[1]});};r.onerror=rej;r.readAsDataURL(file);});
  }
  // Fall back to RTDB base64 (works cross-device, no CORS)
  var safeKey=f.fbKey||f.name.replace(/[.#$/\[\]]/g,'_');
  try{
    var r=await fetch(firebaseUrl+'/fileData/'+dealId+'/'+safeKey+'.json');
    var data=await r.json();
    if(data&&data.contentBytes){
      return {'@odata.type':'#microsoft.graph.fileAttachment',name:data.name||f.name,contentBytes:data.contentBytes};
    }
  }catch(e){}
  toast('Could not load '+f.name,true);return null;
}

function removeRep(i){const n=reps[i];if(!confirm(`Remove ${n}?`))return;reps.splice(i,1);Object.values(deals).forEach(d=>{if(d.reps)d.reps=d.reps.filter(r=>r!==n);if(d.rep===n)d.rep='';});persist();manageReps();renderAll();}
function closeRepsOverlay(){const o=document.getElementById('reps-overlay');if(o)o.remove();}
function openSettings(){const ex=document.getElementById('settings-overlay');if(ex)ex.remove();const o=document.createElement('div');o.className='reps-overlay';o.id='settings-overlay';o.innerHTML=`<div class="reps-box"><h3>Settings</h3><div style="margin-bottom:16px;"><div class="field"><label>Google Sheets Webhook URL</label><input id="webhook-input" placeholder="https://script.google.com/macros/s/..." value="${esc(webhookUrl)}" style="font-size:11px;"></div><p style="font-size:10px;color:var(--text-muted);margin-top:6px;line-height:1.5;">Paste the Web App URL from your Google Apps Script deployment.</p></div><div style="display:flex;gap:8px;justify-content:flex-end;"><button class="btn" onclick="closeSettings()">Cancel</button><button class="btn btn-primary btn-sm" onclick="saveWebhook()">Save</button></div></div>`;document.body.appendChild(o);document.getElementById('webhook-input').focus();}
function saveWebhook(){webhookUrl=document.getElementById('webhook-input').value.trim();saveLocal();if(firebaseUrl&&webhookUrl)fetch(firebaseUrl+'/config/webhookUrl.json',{method:'PUT',body:JSON.stringify(webhookUrl),headers:{'Content-Type':'application/json'}}).catch(()=>{});toast('Webhook URL saved');closeSettings();}
function closeSettings(){const o=document.getElementById('settings-overlay');if(o)o.remove();}

// Init
loadLocal();loadFromFirebase(()=>{renderAll();});
setInterval(()=>{if(!firebaseUrl)return;fetch(firebaseUrl+'/deals.json').then(r=>r.json()).then(data=>{if(!data||typeof data!=='object')return;let ch=false;Object.keys(data).forEach(k=>{if(recentlyDeleted.has(k))return;if(JSON.stringify(data[k])!==JSON.stringify(deals[k])){var localFiles=(deals[k]&&deals[k].storedFiles&&deals[k].storedFiles.length)?deals[k].storedFiles:null;deals[k]=data[k];if(localFiles&&(!deals[k].storedFiles||!deals[k].storedFiles.length)){deals[k].storedFiles=localFiles;}ch=true;}});Object.keys(deals).forEach(k=>{if(!data[k]&&!recentlyDeleted.has(k)){delete deals[k];ch=true;}});if(ch){saveLocal();renderChrome();}}).catch(()=>{});fetch(firebaseUrl+'/reps.json').then(r=>r.json()).then(data=>{if(Array.isArray(data)&&JSON.stringify(data)!==JSON.stringify(reps)){reps=data;saveLocal();renderChrome();}}).catch(()=>{});},5000);
</script>
